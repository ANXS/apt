---
name: Molecule CI

on:
  pull_request:
    branches:
      - "master"
      - "main"
  push:
    branches:
      - "master"
      - "main"
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run lint
        run: make lint

  test:
    name: Test ${{ matrix.os }}-${{ matrix.version }} (upgrade=${{ matrix.upgrade }}, style=${{ matrix.style }}, freq=${{ matrix.frequency }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [debian, ubuntu]
        version: ['11', '12', '13', '2004', '2204', '2404']
        upgrade: ['false', 'true']
        style: ['safe', 'full', 'dist']
        frequency: ['once', 'boot', 'always']

        exclude:
          - os: debian
            version: '2004'
          - os: debian
            version: '2204'
          - os: debian
            version: '2404'
          - os: ubuntu
            version: '11'
          - os: ubuntu
            version: '12'
          - os: ubuntu
            version: '13'

          # When upgrade is false, only test one combination of style/frequency
          - upgrade: 'false'
            style: 'full'
          - upgrade: 'false'
            style: 'dist'
          - upgrade: 'false'
            frequency: 'boot'
          - upgrade: 'false'
            frequency: 'always'

        include:
          - os: debian
            version: '11'
            image: geerlingguy/docker-debian11-ansible:latest
          - os: debian
            version: '12'
            image: geerlingguy/docker-debian12-ansible:latest
          - os: debian
            version: '13'
            image: geerlingguy/docker-debian13-ansible:latest
          - os: ubuntu
            version: '2004'
            image: geerlingguy/docker-ubuntu2004-ansible:latest
          - os: ubuntu
            version: '2204'
            image: geerlingguy/docker-ubuntu2204-ansible:latest
          - os: ubuntu
            version: '2404'
            image: geerlingguy/docker-ubuntu2404-ansible:latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Run molecule test
        run: molecule test
        env:
          MOLECULE_OS: ${{ matrix.os }}
          MOLECULE_VERSION: ${{ matrix.version }}
          MOLECULE_IMAGE: ${{ matrix.image }}
          APT_UPGRADE: ${{ matrix.upgrade }}
          APT_UPGRADE_STYLE: ${{ matrix.style }}
          APT_UPGRADE_FREQUENCY: ${{ matrix.frequency }}
